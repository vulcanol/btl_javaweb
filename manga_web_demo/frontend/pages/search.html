<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> <!-- Cố định kích thước cho Desktop -->
    <meta name="description" content="Cứu Truyện - Tìm kiếm nâng cao">
    <title>Cứu Truyện - Tìm kiếm</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <style>
        .custom-tag-pill {
            display: inline-flex;
            align-items: center;
            background-color: #f7f9fa;
            border: 1px solid #e0e4e8;
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: #3b4249;
        }

        .custom-tag-pill:hover {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
        }

        .tag-count {
            background-color: #e2e8ec;
            color: #475569;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 50px;
            margin-left: 8px;
            font-weight: 700;
        }

        .search-page-btn {
            background-color: #3b82f6;
            color: white;
            font-weight: 600;
            padding: 12px;
            font-size: 1.1rem;
            transition: background-color 0.2s;
            border: none;
        }

        .search-page-btn:hover {
            background-color: #2563eb;
        }
    </style>
    <link rel="stylesheet" href="../assets/css/navbar.css">
</head>

<body>

    <!-- Bắt đầu Header -->
    <!-- Navbar động -->
    <div id="dyn-navbar-container"></div>
    <div id="app-header" style="display:none"></div>
    <!-- Kết thúc Header -->

    <!-- Main Content -->
    <main class="py-5" style="min-height: 80vh;">
        <div class="container px-0 mx-auto" style="max-width: 900px;">

            <h3 class="fw-bold mb-4" style="color: #4a5568;">TÌM KIẾM</h3>

            <form action="#" method="GET">
                <!-- Input Truyện -->
                <div class="mb-3">
                <!-- Search Input -->
                <div class="mb-4">
                    <input type="text" class="form-control form-control-lg border-0 shadow-sm rounded-3 py-3 px-4" id="mainSearchInput"
                        placeholder="Tìm kiếm theo tên truyện hoặc thể loại (ví dụ: action, romance...)" style="font-size: 1.05rem;">
                </div>

                <!-- Thẻ Phổ biến -->
                <div class="mb-4">
                    <h6 class="fw-bold text-muted mb-3" style="font-size: 0.85rem;">THẺ PHỔ BIẾN</h6>

                    <div class="d-flex flex-wrap gap-2" id="tagsContainer">
                        <!-- JS content -->
                    </div>
                </div>

                <!-- Nút Submit -->
                <button id="btnSearchPageSubmit" type="button" class="btn w-100 rounded-3 shadow-sm search-page-btn mt-2">TÌM KIẾM</button>
            </form>

            <!-- Results Section -->
            <div id="searchPageResults" class="mt-5 d-none">
                <h5 class="fw-bold mb-4 text-secondary border-bottom pb-2">KẾT QUẢ TÌM KIẾM</h5>
                <div id="searchPageResultList" class="row g-4">
                    <!-- Results will be injected here -->
                </div>
            </div>

        </div>

        <!-- Floating Chat Button-->
        <a href="#" class="floating-chat-btn">
            <i class="fa-brands fa-facebook-messenger"></i>
        </a>

    </main>

    <!-- Search Overlay -->
    <div id="searchOverlay" class="search-overlay d-none">
        <div class="search-overlay-content container mx-auto" style="max-width: 800px; padding-top: 100px;">
            <div class="position-relative d-flex align-items-center">
                <input type="text" id="liveSearchInput"
                    class="form-control form-control-lg py-3 px-4 rounded-3 shadow-sm pe-5" placeholder="Tìm kiếm...">
                <button id="btnFullSearch" class="btn position-absolute end-0 me-2 text-secondary border-0 fs-4">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <div id="searchResults" class="search-results-container mt-2 d-none w-100" style="position: absolute; top: 100%; left: 0;">
                    <div id="searchResultList" class="list-group shadow-sm border-0">
                        <!-- Live search results injected by JS -->
                    </div>
                </div>
            </div>
        </div>
        <button id="closeSearchBtn" class="btn text-secondary position-absolute top-0 end-0 m-4 fs-2 border-0"><i
                class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            const searchInput = document.getElementById('mainSearchInput');
            const btnSubmit = document.getElementById('btnSearchPageSubmit');
            const resultsContainer = document.getElementById('searchPageResults');
            const resultList = document.getElementById('searchPageResultList');

            const performSearch = async (q) => {
                if (!q) return;
                searchInput.value = q;
                
                try {
                    resultList.innerHTML = '<div class="col-12 text-center p-5"><div class="spinner-border text-primary" role="status"></div></div>';
                    resultsContainer.classList.remove('d-none');

                    const response = await ApiService.searchMangas(q);
                    const items = response.content || [];

                    if (items.length > 0) {
                        resultList.innerHTML = items.map(m => `
                            <div class="col-3">
                                <a href="chi-tiet-truyen.html?id=${m.seriesId}" class="text-decoration-none">
                                    <div class="card border-0 shadow-sm h-100 manga-card">
                                        <img src="${getImageUrl(m.coverUrl)}" class="card-img-top" alt="${m.title}" style="height: 220px; object-fit: cover;">
                                        <div class="card-body p-2">
                                            <h6 class="card-title text-dark fw-bold mb-1 text-truncate">${m.title}</h6>
                                            <small class="text-muted">${m.seriesType || 'Manga'}</small>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        `).join('');
                    } else {
                        resultList.innerHTML = `<div class="col-12 text-center p-5 text-muted">Không tìm thấy truyện nào khớp với "${q}"</div>`;
                    }
                } catch (err) {
                    resultList.innerHTML = `<div class="col-12 text-center p-5 text-danger">Lỗi: ${err.message}</div>`;
                }
            };

            if (query) {
                performSearch(query);
            }

            btnSubmit.addEventListener('click', () => {
                const q = searchInput.value.trim();
                if (q) {
                    performSearch(q);
                    // Update URL without reloading
                    const newUrl = window.location.pathname + '?q=' + encodeURIComponent(q);
                    window.history.pushState({path: newUrl}, '', newUrl);
                }
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    btnSubmit.click();
                }
            });

            // Load Tags
            const tagsContainer = document.getElementById('tagsContainer');
            try {
                const genres = await ApiService.getGenres();
                if (genres && genres.length > 0) {
                    tagsContainer.innerHTML = genres.map(g => `
                        <div class="custom-tag-pill shadow-sm">${g.genreName}</div>
                    `).join('');
                } else {
                    tagsContainer.innerHTML = '<span class="text-muted">Chưa có thẻ nào</span>';
                }
                
                // Make tag pills interactive
                document.querySelectorAll('.custom-tag-pill').forEach(pill => {
                    pill.addEventListener('click', () => {
                        const tagText = pill.textContent.trim();
                        const currentValue = searchInput.value.trim();
                        if (currentValue) {
                            searchInput.value = currentValue + ' ' + tagText;
                        } else {
                            searchInput.value = tagText;
                        }
                        btnSubmit.click();
                    });
                });
            } catch(e) {
                console.error("Failed to load tags", e);
            }
        });
    </script>
</body>

</html>
