<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Thống Kê - Cứu Truyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/navbar.css">
</head>
<body>
    <!-- Navbar động -->
    <div id="dyn-navbar-container"></div>
    <div id="app-header" style="display:none"></div>
    <main class="py-5" style="min-height: 80vh;">
        <div class="container mx-auto" style="max-width: 1200px;">
            <h2 class="fw-bold mb-4"><i class="fa-solid fa-chart-line text-primary me-2"></i> Thống Kê Dữ Liệu</h2>
            <div class="row g-4" id="statsContainer">
                <div class="col-12 text-center text-secondary py-5" id="statsLoading">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p>Đang tải dữ liệu thống kê...</p>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                alert("Bạn không có quyền truy cập trang này!");
                window.location.href = '../index.html';
                return;
            }

            try {
                const stats = await ApiService.getStats();
                document.getElementById('statsContainer').innerHTML = `
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 rounded-4 p-4 text-center h-100" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                            <i class="fa-solid fa-users fa-3x text-primary mb-3"></i>
                            <h5 class="text-secondary mb-1">Tổng User</h5>
                            <h2 class="fw-bold text-white mb-0">${stats.totalUsers.toLocaleString()}</h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 rounded-4 p-4 text-center h-100" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                            <i class="fa-solid fa-book-open fa-3x text-success mb-3"></i>
                            <h5 class="text-secondary mb-1">Tổng Truyện</h5>
                            <h2 class="fw-bold text-white mb-0">${stats.totalManga.toLocaleString()}</h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 rounded-4 p-4 text-center h-100" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                            <i class="fa-solid fa-eye fa-3x text-warning mb-3"></i>
                            <h5 class="text-secondary mb-1">Lượt Xem</h5>
                            <h2 class="fw-bold text-white mb-0">${stats.totalViews.toLocaleString()}</h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 rounded-4 p-4 text-center h-100" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                            <i class="fa-solid fa-users-viewfinder fa-3x text-danger mb-3"></i>
                            <h5 class="text-secondary mb-1">Nhóm Dịch</h5>
                            <h2 class="fw-bold text-white mb-0">${stats.totalGroups.toLocaleString()}</h2>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('statsLoading').innerHTML = '<div class="alert alert-danger">Lỗi khi tải dữ liệu thống kê.</div>';
            }
        });
    </script>
</body>
</html>
