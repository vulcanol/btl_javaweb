<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Quản Lý Báo Cáo - Cứu Truyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div id="app-header"></div>
    <main class="py-5" style="min-height: 80vh;">
        <div class="container mx-auto" style="max-width: 1200px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0"><i class="fa-solid fa-flag text-danger me-2"></i> Quản Lý Báo Cáo</h2>
                <select id="statusFilter" class="form-select bg-dark text-white border-secondary w-auto" onchange="loadReports()">
                    <option value="">Tất cả trạng thái</option>
                    <option value="PENDING" selected>Chờ xử lý</option>
                    <option value="RESOLVED">Đã giải quyết</option>
                    <option value="DISMISSED">Đã bỏ qua</option>
                </select>
            </div>
            
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle table-dark table-striped text-white">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Người Báo Cáo</th>
                                <th>Loại</th>
                                <th>ID Đối Tượng</th>
                                <th>Lý Do</th>
                                <th>Trạng Thái</th>
                                <th>Ngày Tạo</th>
                                <th class="text-end">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <tr>
                                <td colspan="8" class="text-center py-4">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                alert("Bạn không có quyền truy cập trang này!");
                window.location.href = '../index.html';
                return;
            }

            await loadReports();
        });

        async function loadReports() {
            try {
                const status = document.getElementById('statusFilter').value;
                const reports = await ApiService.getReports(status);
                const tbody = document.getElementById('reportTableBody');
                
                if (reports.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-secondary py-4">Không có báo cáo nào.</td></tr>';
                    return;
                }

                tbody.innerHTML = reports.map(r => {
                    let statusBadge = '';
                    if (r.status === 'PENDING') statusBadge = '<span class="badge bg-warning text-dark">Chờ xử lý</span>';
                    else if (r.status === 'RESOLVED') statusBadge = '<span class="badge bg-success">Đã xử lý</span>';
                    else statusBadge = '<span class="badge bg-secondary">Bỏ qua</span>';

                    return `
                    <tr>
                        <td>#${r.reportId}</td>
                        <td class="fw-bold text-info">${r.user ? r.user.username : 'Ẩn danh'}</td>
                        <td><span class="badge border border-secondary text-secondary">${r.entityType.toUpperCase()}</span></td>
                        <td>${r.entityId}</td>
                        <td><div style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${r.reason}">${r.reason}</div></td>
                        <td>${statusBadge}</td>
                        <td>${new Date(r.createdAt).toLocaleString()}</td>
                        <td class="text-end">
                            ${r.status === 'PENDING' ? `
                                <button class="btn btn-sm btn-outline-success me-1" onclick="resolveReport(${r.reportId}, 'RESOLVED')" title="Đánh dấu Đã xử lý"><i class="fa-solid fa-check"></i></button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="resolveReport(${r.reportId}, 'DISMISSED')" title="Bỏ qua"><i class="fa-solid fa-xmark"></i></button>
                            ` : '-'}
                        </td>
                    </tr>
                `}).join('');
            } catch (err) {
                document.getElementById('reportTableBody').innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">Lỗi tải dữ liệu.</td></tr>';
            }
        }

        async function resolveReport(id, newStatus) {
            if (confirm("Xác nhận cập nhật trạng thái báo cáo này?")) {
                try {
                    await ApiService.resolveReport(id, newStatus);
                    await loadReports();
                } catch (err) {
                    console.error(err);
                    alert("Có lỗi xảy ra: " + err.message);
                }
            }
        }
    </script>
</body>
</html>
