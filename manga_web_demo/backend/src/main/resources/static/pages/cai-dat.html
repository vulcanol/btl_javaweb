<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <meta name="description" content="Cứu Truyện - Cài Đặt Tài Khoản">
    <title>Cài Đặt - Cứu Truyện</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body {
            background-color: var(--primary-bg);
        }
        .settings-container {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .settings-sidebar {
            background-color: #f8f9fa;
            border-right: 1px solid #eee;
            padding: 2rem 1.5rem;
        }
        .settings-content {
            padding: 3rem;
        }
        .nav-pills .nav-link {
            color: #5c514b;
            font-weight: 600;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }
        .nav-pills .nav-link.active {
            background-color: #1e293b;
            color: #fff;
        }
        .nav-pills .nav-link:hover:not(.active) {
            background-color: #e9ecef;
        }
        .form-label {
            font-weight: 700;
            color: #4a413b;
            margin-bottom: 0.5rem;
        }
        .custom-input {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1.5px solid #dcd4cc;
            background-color: #fafafa;
        }
        .custom-input:focus {
            border-color: #f7a928;
            box-shadow: 0 0 0 0.25rem rgba(247, 169, 40, 0.1);
            background-color: #fff;
        }
        .btn-save {
            background-color: #1e293b;
            color: #fff;
            font-weight: 700;
            padding: 0.8rem 2rem;
            border-radius: 10px;
            border: none;
            transition: transform 0.2s;
        }
        .btn-save:hover {
            background-color: #0f172a;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <!-- Header (Giữ nguyên) -->
    <div id="app-header"></div>

    <main class="py-5">
        <div class="container mx-auto" style="max-width: 1000px;">
            <h2 class="fw-bold fs-3 text-dark mb-4"><i class="fa-solid fa-sliders me-2"></i> Cài Đặt Tài Khoản</h2>
            
            <div class="settings-container d-flex">
                <!-- Sidebar -->
                <div class="settings-sidebar col-3">
                    <div class="nav flex-column nav-pills" id="settings-tabs" role="tablist" aria-orientation="vertical">
                        <button class="nav-link active text-start" id="profile-tab" data-bs-toggle="pill" data-bs-target="#profile" type="button" role="tab">
                            <i class="fa-solid fa-user-circle me-2"></i> Thông tin cá nhân
                        </button>
                        <button class="nav-link text-start" id="security-tab" data-bs-toggle="pill" data-bs-target="#security" type="button" role="tab">
                            <i class="fa-solid fa-shield-halved me-2"></i> Bảo mật & Mật khẩu
                        </button>
                    </div>
                </div>

                <!-- Content Area -->
                <div class="settings-content col-9">
                    <div class="tab-content" id="settings-tabsContent">
                        <!-- Tab: Thông tin cá nhân -->
                        <div class="tab-pane fade show active" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                            <h4 class="fw-bold mb-4">Thông tin cá nhân</h4>
                            <p class="text-secondary small mb-4">Mọi thông báo giao dịch và đặt lại mật khẩu sẽ được gửi về email của bạn.</p>
                            
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">ID Tài khoản</label>
                                    <input type="text" class="form-control custom-input fw-bold text-primary" id="profileUserId" value="12345" readonly style="background-color: #f1f3f5;">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Gmail hiện tại</label>
                                    <input type="email" class="form-control custom-input" id="profileUserEmail" value="user_test@gmail.com" readonly style="background-color: #f1f3f5;">
                                </div>
                                <div class="mb-5">
                                    <label class="form-label">Gmail mới</label>
                                    <input type="email" class="form-control custom-input" id="newEmailInput" placeholder="Nhập địa chỉ Gmail mới...">
                                    <div class="form-text mt-2"><i class="fa-solid fa-circle-exclamation"></i> Chúng tôi sẽ cập nhật email của bạn.</div>
                                </div>
                                <button type="button" class="btn-save" id="btnUpdateEmail">LƯU CẬP NHẬT</button>
                            </form>
                        </div>

                        <!-- Tab: Bảo mật -->
                        <div class="tab-pane fade" id="security" role="tabpanel" aria-labelledby="security-tab">
                            <h4 class="fw-bold mb-4">Thay đổi mật khẩu</h4>
                            <p class="text-secondary small mb-4">Bạn nên sử dụng mật khẩu mạnh bao gồm chữ hoa, chữ thường và chữ số.</p>
                            
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu hiện tại</label>
                                    <input type="password" class="form-control custom-input" id="currentPasswordInput" placeholder="••••••••">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Mật khẩu mới</label>
                                    <input type="password" class="form-control custom-input" id="newPasswordInput" placeholder="Nhập mật khẩu mới">
                                </div>
                                <div class="mb-5">
                                    <label class="form-label">Xác nhận mật khẩu mới</label>
                                    <input type="password" class="form-control custom-input" id="confirmPasswordInput" placeholder="Nhập lại mật khẩu mới">
                                </div>
                                <button type="button" class="btn-save" id="btnUpdatePassword">CẬP NHẬT MẬT KHẨU</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href='../index.html';
                return;
            }

            let profile = null;
            try {
                // Fetch latest profile info
                profile = await ApiService.getProfile();
            } catch (e) {
                console.error("Lỗi lấy thông tin user từ API, dùng dữ liệu local", e);
                profile = JSON.parse(userStr);
            }

            if (profile) {
                const idInput = document.getElementById('profileUserId');
                const emailInput = document.getElementById('profileUserEmail');
                
                if (idInput && profile.userId) {
                    idInput.value = profile.userId;
                    // Bỏ style readonly màu xám để nhìn rõ hơn
                    idInput.style.backgroundColor = '#fff';
                }
                
                if (emailInput) {
                    emailInput.value = profile.email || 'Chưa cập nhật email';
                }

                // Update localStorage with fresh profile data
                const user = JSON.parse(userStr);
                user.email = profile.email;
                localStorage.setItem('user', JSON.stringify(user));
            }

            // Xử lý cập nhật Email
            const btnUpdateEmail = document.getElementById('btnUpdateEmail');
            if (btnUpdateEmail) {
                btnUpdateEmail.addEventListener('click', async () => {
                    const newEmail = document.getElementById('newEmailInput').value;
                    if (!newEmail) {
                        alert("Vui lòng nhập email mới!");
                        return;
                    }
                    try {
                        btnUpdateEmail.disabled = true;
                        btnUpdateEmail.innerText = "ĐANG LƯU...";
                        const res = await ApiService.updateEmail(newEmail);
                        alert(res.message || "Cập nhật email thành công!");
                        document.getElementById('profileUserEmail').value = newEmail;
                        document.getElementById('newEmailInput').value = '';
                        
                        const user = JSON.parse(localStorage.getItem('user'));
                        user.email = newEmail;
                        localStorage.setItem('user', JSON.stringify(user));
                    } catch (err) {
                        alert("Lỗi: " + err.message);
                    } finally {
                        btnUpdateEmail.disabled = false;
                        btnUpdateEmail.innerText = "LƯU CẬP NHẬT";
                    }
                });
            }

            // Xử lý cập nhật Mật khẩu
            const btnUpdatePassword = document.getElementById('btnUpdatePassword');
            if (btnUpdatePassword) {
                btnUpdatePassword.addEventListener('click', async () => {
                    const currentPassword = document.getElementById('currentPasswordInput').value;
                    const newPassword = document.getElementById('newPasswordInput').value;
                    const confirmPassword = document.getElementById('confirmPasswordInput').value;

                    if (!currentPassword || !newPassword || !confirmPassword) {
                        alert("Vui lòng điền đầy đủ các trường mật khẩu!");
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        alert("Mật khẩu mới và xác nhận mật khẩu không khớp!");
                        return;
                    }

                    try {
                        btnUpdatePassword.disabled = true;
                        btnUpdatePassword.innerText = "ĐANG CẬP NHẬT...";
                        const res = await ApiService.updatePassword(currentPassword, newPassword);
                        alert(res.message || "Đã đổi mật khẩu thành công!");
                        document.getElementById('currentPasswordInput').value = '';
                        document.getElementById('newPasswordInput').value = '';
                        document.getElementById('confirmPasswordInput').value = '';
                    } catch (err) {
                        alert("Lỗi: " + err.message);
                    } finally {
                        btnUpdatePassword.disabled = false;
                        btnUpdatePassword.innerText = "CẬP NHẬT MẬT KHẨU";
                    }
                });
            }
        });
    </script>
</body>

</html>
