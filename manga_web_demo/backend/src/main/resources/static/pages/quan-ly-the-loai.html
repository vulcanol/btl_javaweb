<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Quản Lý Thể Loại - Cứu Truyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div id="app-header"></div>
    <main class="py-5" style="min-height: 80vh;">
        <div class="container mx-auto" style="max-width: 1200px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0"><i class="fa-solid fa-tags text-warning me-2"></i> Quản Lý Thể Loại</h2>
                <button class="btn btn-warning fw-bold text-dark" onclick="addGenre()">
                    <i class="fa-solid fa-plus me-1"></i> Thêm Thể Loại
                </button>
            </div>
            
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle table-dark table-striped text-white">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Tên Thể Loại</th>
                                <th class="text-end">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="genreTableBody">
                            <tr>
                                <td colspan="3" class="text-center py-4">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="genreModal" tabindex="-1" data-bs-theme="dark">
      <div class="modal-dialog">
        <div class="modal-content text-white" style="background-color: var(--card-bg);">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="genreModalTitle">Thêm Thể Loại</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="genreId">
            <div class="mb-3">
              <label for="genreName" class="form-label">Tên Thể Loại</label>
              <input type="text" class="form-control bg-dark text-white border-secondary" id="genreName" required>
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-warning fw-bold text-dark" id="btnSaveGenre">Lưu Lại</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        let modal;
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                alert("Bạn không có quyền truy cập trang này!");
                window.location.href = '../index.html';
                return;
            }

            modal = new bootstrap.Modal(document.getElementById('genreModal'));
            await loadGenres();

            document.getElementById('btnSaveGenre').addEventListener('click', async () => {
                const id = document.getElementById('genreId').value;
                const name = document.getElementById('genreName').value.trim();
                if (!name) return alert("Vui lòng nhập tên thể loại!");
                
                try {
                    if (id) {
                        await ApiService.updateGenre(id, name);
                    } else {
                        await ApiService.createGenre(name);
                    }
                    modal.hide();
                    await loadGenres();
                } catch (err) {
                    console.error(err);
                    alert("Có lỗi xảy ra: " + err.message);
                }
            });
        });

        async function loadGenres() {
            try {
                const genres = await ApiService.getGenres();
                const tbody = document.getElementById('genreTableBody');
                if (genres.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-secondary py-4">Chưa có thể loại nào.</td></tr>';
                    return;
                }
                tbody.innerHTML = genres.map(g => `
                    <tr>
                        <td>#${g.genreId}</td>
                        <td class="fw-bold">${g.genreName}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-info me-2" onclick="editGenre(${g.genreId}, '${g.genreName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteGenre(${g.genreId})"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('genreTableBody').innerHTML = '<tr><td colspan="3" class="text-center text-danger py-4">Lỗi tải dữ liệu.</td></tr>';
            }
        }

        function addGenre() {
            document.getElementById('genreModalTitle').textContent = "Thêm Thể Loại";
            document.getElementById('genreId').value = "";
            document.getElementById('genreName').value = "";
            modal.show();
        }

        function editGenre(id, name) {
            document.getElementById('genreModalTitle').textContent = "Sửa Thể Loại";
            document.getElementById('genreId').value = id;
            document.getElementById('genreName').value = name;
            modal.show();
        }

        async function deleteGenre(id) {
            if (confirm("Bạn có chắc chắn muốn xóa thể loại này?")) {
                try {
                    await ApiService.deleteGenre(id);
                    await loadGenres();
                } catch (err) {
                    console.error(err);
                    alert("Có lỗi xảy ra khi xóa.");
                }
            }
        }
    </script>
</body>
</html>
