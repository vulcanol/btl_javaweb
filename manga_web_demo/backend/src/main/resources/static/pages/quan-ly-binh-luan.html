<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Quản Lý Bình Luận - Cứu Truyện</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div id="app-header"></div>
    <main class="py-5" style="min-height: 80vh;">
        <div class="container mx-auto" style="max-width: 1200px;">
            <h2 class="fw-bold mb-4"><i class="fa-solid fa-comments text-success me-2"></i> Quản Lý Bình Luận</h2>
            
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle table-dark table-striped text-white">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Người Dùng</th>
                                <th>Nội Dung</th>
                                <th>Truyện</th>
                                <th>Ngày Đăng</th>
                                <th class="text-end">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody id="commentTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-4">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                alert("Bạn không có quyền truy cập trang này!");
                window.location.href = '../index.html';
                return;
            }

            await loadComments();
        });

        async function loadComments() {
            try {
                const comments = await ApiService.getAllComments();
                const tbody = document.getElementById('commentTableBody');
                if (comments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">Chưa có bình luận nào.</td></tr>';
                    return;
                }
                
                // Sort by ID desc (newest first)
                comments.sort((a, b) => b.commentId - a.commentId);

                tbody.innerHTML = comments.map(c => `
                    <tr>
                        <td>#${c.commentId}</td>
                        <td class="fw-bold text-info">${c.user ? c.user.username : 'Ẩn danh'}</td>
                        <td><div style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${c.content}</div></td>
                        <td>${c.series ? c.series.title : '-'} ${c.chapter ? '(Chương ' + c.chapter.chapterNumber + ')' : ''}</td>
                        <td>${new Date(c.createdAt).toLocaleString()}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteComment(${c.commentId})"><i class="fa-solid fa-trash"></i> Xóa</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('commentTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">Lỗi tải dữ liệu bình luận.</td></tr>';
            }
        }

        async function deleteComment(id) {
            if (confirm("Bạn có chắc chắn muốn xóa bình luận này? Thao tác không thể hoàn tác!")) {
                try {
                    await ApiService.deleteCommentAdmin(id);
                    await loadComments();
                } catch (err) {
                    console.error(err);
                    alert("Có lỗi xảy ra khi xóa.");
                }
            }
        }
    </script>
</body>
</html>
